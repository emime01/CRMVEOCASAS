    window.runSeed = async function() {
      const btn = document.getElementById("btn");
      const log = document.getElementById("log");
      btn.disabled = true;
      btn.textContent = "Importando...";
      log.innerHTML = '<div class="info">Iniciando importación de ' + ventas.length + ' ventas...</div>';

      let ok = 0, err = 0;
      for (const v of ventas) {
        const ejecutivoId = ejecutivoMap[v.ejecutivo] || v.ejecutivo.toLowerCase();
        try {
          await addDoc(collection(db, "ventas"), {
            ...v,
            ejecutivo: ejecutivoId,
            created_at: v.fecha_venta,
            subtotal: Math.round(v.total / 1.22),
            productos_seleccionados: [],
            estado: "activa",
            solicitud_modificacion: false,
            modificacion_aprobada: false,
          });
          ok++;
          log.innerHTML += `<div class="ok">✓ [${ok}] ${v.inmobiliaria}</div>`;
          log.scrollTop = log.scrollHeight;
        } catch(e) {
          err++;
          log.innerHTML += `<div class="err">✗ ${v.inmobiliaria}: ${e.message}</div>`;
        }
      }
      log.innerHTML += `<div class="info" style="margin-top:12px;font-size:15px">✅ Importación completa: ${ok} ok / ${err} errores</div>`;
      btn.textContent = `✅ Listo — ${ok} ventas importadas`;
    };
  </script>
