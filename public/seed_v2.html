window.runSeed = async function() {
  const btn = document.getElementById("btn");
  btn.disabled = true;
  log("⚡ Borrando ventas existentes...", "warn");

  // Borrar todas las ventas existentes
  const snap = await getDocs(collection(db, "ventas"));
  let deleted = 0;
  for(const d of snap.docs){
    await deleteDoc(doc(db, "ventas", d.id));
    deleted++;
  }
  log(`🗑️ ${deleted} ventas borradas`, "warn");
  log(`📥 Importando ${ventas.length} ventas...`, "info");

  let ok = 0;
  for(const v of ventas){
    const ejecutivoId = EM[v.ejecutivo] || v.ejecutivo.toLowerCase();
    // Generar cuotas con estado pagado
    const cuotasDetalle = [];
    for(let i=0;i<v.num_cuotas;i++){
      const f = new Date(v.fecha_inicio);
      f.setMonth(f.getMonth()+i);
      cuotasDetalle.push({
        numero: i+1,
        fecha: f.toISOString().split("T")[0],
        monto: Math.round(v.total/v.num_cuotas),
        pagada: false,
        nro_factura: i===0 ? v.nro_factura : "",
      });
    }
    try {
      await addDoc(collection(db,"ventas"),{
        ...v,
        ejecutivo: ejecutivoId,
        created_at: v.fecha_venta,
        subtotal: Math.round(v.total/1.22),
        metodo_pago: v.tipo_pago==="contado" ? v.subtipo_contado : `${v.subtipo_cuotas} (${v.num_cuotas} cuotas)`,
        productos_seleccionados:[],
        estado:"activa",
        solicitud_modificacion:false,
        modificacion_aprobada:false,
        facturado: true,
        cuotas_detalle: cuotasDetalle,
      });
      ok++;
      log(`✓ [${ok}] ${v.inmobiliaria} — ${v.num_cuotas>1?`${v.num_cuotas} cuotas`:"Contado"}`);
    } catch(e){
      log(`✗ ${v.inmobiliaria}: ${e.message}`, "err");
    }
  }
  log(`\n✅ Listo: ${ok}/${ventas.length} ventas importadas`, "info");
  btn.textContent = `✅ ${ok} ventas importadas`;
};
</script>

<button id="btn" onclick="runSeed()">🚀 Reimportar ventas (borra las anteriores)</button>
